name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24 ships npm 11, matching the lockfile's resolution (npm 10
          # computes dedup differently and rejects the lock as out of sync).
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Tests run against compiled dist/, so build first.
      - name: Build
        run: npm run build

      - name: Test
        run: npm test
