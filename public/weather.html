<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>weather-mcp — forecast</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font: 16px/1.6 ui-serif, Georgia, "Times New Roman", serif;
        max-width: 46rem; margin: 8vh auto; padding: 0 1.25rem;
        color: #1a1a1a; background: #f7f5ef;
      }
      a { color: #1a4fff; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .95rem; }
      @media (prefers-color-scheme: dark) {
        body { color: #ece9e0; background: #14130f; }
        a { color: #9ab8ff; }
        input, .day, .err { background: #1c1b16; border-color: #4a473d; }
      }
      h1 { font-size: 1.9rem; margin: 0 0 .25rem; letter-spacing: -.01em; }
      .sub { font-style: italic; opacity: .7; margin: 0 0 1.75rem; }
      .back { font-size: .85rem; }
      form { display: flex; gap: .6rem; flex-wrap: wrap; align-items: center; }
      input, select, button {
        font: inherit; font-size: .95rem; padding: .45rem .7rem; border-radius: .5rem;
        border: 1px solid #cfc9b8; background: #fffdf7; color: inherit;
      }
      input { flex: 1 1 14rem; }
      button { cursor: pointer; border-color: #1a4fff; background: transparent; }
      .loc { margin: 1.4rem 0 .6rem; font-weight: 600; }
      .muted { opacity: .6; font-size: .85rem; }
      .days { display: grid; grid-template-columns: repeat(auto-fill, minmax(8.5rem, 1fr)); gap: .7rem; }
      .day { border: 1px solid #e7e1d0; border-radius: .6rem; padding: .7rem .8rem; background: #fffdf7; }
      .day .d { font-family: ui-monospace, Menlo, monospace; font-size: .8rem; opacity: .65; }
      .day .c { font-size: .9rem; margin: .15rem 0; }
      .day .t { font-family: ui-monospace, Menlo, monospace; }
      .err { margin-top: 1.2rem; padding: 1rem 1.2rem; border: 1px solid #d98; border-radius: .6rem; background: #fffdf7; }
    </style>
  </head>
  <body>
    <p class="back"><a href="/">← weather-mcp</a></p>
    <h1>Forecast</h1>
    <p class="sub">
      Live data from the same <code>WeatherService</code> the MCP tools use,
      exposed over REST (<code>GET /weather/forecast</code>) so the browser can
      call it directly.
    </p>

    <form id="form">
      <input id="city" placeholder="City (e.g. Tokyo, Paris, Austin TX)" value="London" />
      <select id="days">
        <option value="3">3 days</option>
        <option value="7" selected>7 days</option>
        <option value="14">14 days</option>
      </select>
      <button>Get forecast</button>
    </form>

    <div id="result"></div>

    <script>
      const form = document.getElementById('form');
      const result = document.getElementById('result');

      form.addEventListener('submit', async ev => {
        ev.preventDefault();
        const city = document.getElementById('city').value.trim();
        const days = document.getElementById('days').value;
        if (!city) return;
        result.innerHTML = '<p class="muted">Loading…</p>';
        try {
          const qs = new URLSearchParams({city, days});
          const res = await fetch('/weather/forecast?' + qs.toString());
          const body = await res.json().catch(() => ({}));
          if (!res.ok) {
            const msg = (body.error && body.error.message) || ('HTTP ' + res.status);
            result.innerHTML = '<div class="err"><strong>No forecast</strong> — ' + escapeHtml(msg) + '</div>';
            return;
          }
          render(body);
        } catch (err) {
          result.innerHTML = '<div class="err"><strong>Error</strong> — ' + escapeHtml(String(err)) + '</div>';
        }
      });

      function render(b) {
        const u = b.temperature_unit || '°';
        const days = b.days.map(d =>
          '<div class="day">' +
          '<div class="d">' + escapeHtml(d.date) + '</div>' +
          '<div class="c">' + escapeHtml(d.condition) + '</div>' +
          '<div class="t">' + fmt(d.temperature_max) + ' / ' + fmt(d.temperature_min) +
          ' <span class="muted">' + escapeHtml(u) + '</span></div>' +
          '</div>',
        ).join('');
        result.innerHTML =
          '<p class="loc">' + escapeHtml(b.location.name) +
          ' <span class="muted">(' + b.location.latitude.toFixed(2) + ', ' +
          b.location.longitude.toFixed(2) + ')</span></p>' +
          '<div class="days">' + days + '</div>';
      }
      function fmt(n) { return Math.round(n) + '°'; }
      function escapeHtml(s) {
        return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
      }
    </script>
  </body>
</html>
